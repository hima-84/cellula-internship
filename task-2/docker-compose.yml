version: '3.8'

services:
  streamlit:
    build: .
    container_name: teeth-classification-app
    ports:
      - "8501:8501"
    volumes:
      - ./app.py:/app/app.py
      - ./Tas2k.pth:/app/Tas2k.pth
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_LOGGER_LEVEL=info
    restart: unless-stopped
